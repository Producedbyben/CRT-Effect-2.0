<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRT Effect Renderer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>CRT Effect Renderer</h1>
        <label class="file-input">
          <span>Image / Video source</span>
          <input id="imageInput" type="file" accept="image/*,video/*,.mov,.webm,.mp4" />
        </label>

        <label>Preset
          <select id="presetSelect"></select>
        </label>

        <label>Scanline strength <input id="scanlineStrength" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>Phosphor mask <input id="phosphorMask" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>Barrel distortion <input id="barrelDistortion" type="range" min="-0.8" max="0.8" step="0.01" value="0" /></label>
        <label>Bloom <input id="bloom" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>Flicker <input id="flicker" type="range" min="0" max="1" step="0.01" value="0.22" /></label>
        <label>Chromatic aberration <input id="chromaticAberration" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>Noise <input id="noise" type="range" min="0" max="1" step="0.01" value="0.5" /></label>
        <label>Pixel size <input id="pixelSize" type="range" min="1" max="8" step="1" value="1" /></label>

        <div class="row">
          <label>FPS <input id="fps" type="number" value="30" min="12" max="120" /></label>
          <label>Duration (s) <input id="duration" type="number" value="4" min="1" max="20" step="0.5" /></label>
        </div>

        <div class="video-controls">
          <label>Preview mode
            <select id="previewMode">
              <option value="still" selected>Still frame (recommended)</option>
              <option value="playback">Playback</option>
            </select>
          </label>
          <div class="row">
            <label>Preview FPS <input id="previewFps" type="number" value="15" min="1" max="60" /></label>
            <label>Preview scale
              <select id="previewScale">
                <option value="1">100%</option>
                <option value="0.75">75%</option>
                <option value="0.5" selected>50%</option>
                <option value="0.33">33%</option>
              </select>
            </label>
          </div>
          <label>Preview quality
            <select id="previewMaxPixels">
              <option value="307200">Fast (640x480)</option>
              <option value="921600" selected>Balanced (1280x720)</option>
              <option value="2073600">High (1920x1080)</option>
              <option value="0">Unlimited</option>
            </select>
          </label>
          <label>Preview frame (s)
            <input id="previewTime" type="range" min="0" max="0" step="0.01" value="0" disabled />
          </label>
          <label>Source downsample
            <select id="sourceScale">
              <option value="1" selected>100% (native)</option>
              <option value="0.75">75%</option>
              <option value="0.5">50%</option>
              <option value="0.33">33%</option>
              <option value="0.25">25%</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button id="exportBtn">Export MP4</button>
          <button id="cancelExportBtn" type="button" disabled>Cancel export</button>
          <button id="resetParamsBtn" type="button">Reset parameters</button>
          <button id="resetSourceBtn" type="button">Reset source</button>
        </div>
        <div id="status" class="status">Load an image to begin.</div>
        <progress id="progress" max="1" value="0"></progress>
      </section>

      <section class="preview">
        <canvas id="previewCanvas" width="960" height="540"></canvas>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
